<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Full Stack Interactive Quiz</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>🚀 Full Stack Interactive Quiz</h1>
<p>Participate and see live results!</p>

</header>

<div class="container">

<h2 id="topic"></h2>

<p id="description"></p>

<div id="question"></div>

<div id="options"></div>

<div id="timer"></div>

<canvas id="resultsChart"></canvas>

<button id="nextBtn">Next</button>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
