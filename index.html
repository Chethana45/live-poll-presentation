<!DOCTYPE html>
<html>

<head>

<title>Interactive Tech Quiz</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>🚀 Full Stack Interactive Quiz</h1>

<p>Join the poll and see live results</p>

</header>

<div class="container">

<h2 id="topic"></h2>

<p id="theory"></p>

<div id="questionBox">

<h3 id="question"></h3>

<div id="options"></div>

<p id="timer"></p>

</div>

<canvas id="chart"></canvas>

<h3 id="score"></h3>

<button id="startBtn">Start Poll</button>

<button id="nextBtn">Next</button>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
