<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Full Stack Interactive Quiz</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js for poll results -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>🚀 Full Stack Interactive Presentation</h1>

<p>Participate in the live poll and see results instantly</p>

</header>

<div class="container">

<!-- Topic Title -->
<h2 id="topic"></h2>

<!-- Theory Section -->
<p id="theory"></p>

<!-- Question Section -->
<div id="questionBox">

<h3 id="question"></h3>

<div id="options"></div>

<p id="timer"></p>

</div>

<!-- Poll Results Chart -->
<canvas id="chart" width="400" height="200"></canvas>

<!-- Score Display -->
<h3 id="score"></h3>

<!-- Controls -->
<button id="startBtn">Start Poll</button>

<button id="nextBtn">Next Topic</button>

</div>

<!-- Main Script -->
<script type="module" src="script.js"></script>

</body>

</html>
